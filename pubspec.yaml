name: zenit_webview_sdk
description: Flutter SDK package that embeds Zenit's web app in a WebView with a JavaScript bridge.
version: 1.0.0
homepage: https://github.com/zenit/zenit_webview_sdk
repository: https://github.com/zenit/zenit_webview_sdk
issue_tracker: https://github.com/zenit/zenit_webview_sdk/issues
topics:
  - flutter
  - webview
  - sdk

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
